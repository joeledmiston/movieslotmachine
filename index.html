<!DOCTYPE html>
<html>
<head>
  <title>Joel's Movie Slot Machine</title>

  <style>
    body {
      font-family: "Comic Sans MS", Arial, sans-serif;
      text-align: center;
      background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00);
      overflow: hidden;
    }

    h1 {
      font-size: 58px;
      margin-top: 20px;
      color: blue;
      text-shadow: 2px 2px white, 4px 4px black;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 14px;
    }

    .tab-button {
      margin-top: 0;
      padding: 10px 18px;
      font-size: 18px;
    }

    .tab-button.active {
      background: yellow;
      border-color: black;
    }

    .game-panel {
      display: none;
    }

    .game-panel.active {
      display: block;
    }

    #open-game {
      position: relative;
      min-height: 680px;
      padding-top: 26px;
      box-sizing: border-box;
    }

    #open-game h1 {
      margin: 24px auto 10px;
      font-size: 56px;
    }

    .open-layout {
      position: relative;
      width: 820px;
      max-width: 94vw;
      min-height: 360px;
      margin: 0 auto;
    }

    #face {
      width: 140px;
      border: 5px outset gold;
      box-shadow: 0 0 0 3px black;
    }

    .spinning {
      animation: spinny 0.8s linear infinite;
    }

    @keyframes spinny {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .machine {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      margin-top: 40px;
      gap: 10px;
    }

    .column {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .label {
      font-size: 22px;
      background: yellow;
      border: 3px solid black;
      padding: 4px 10px;
    }

    .year-range {
      width: 180px;
      margin-top: 10px;
      background: #ffdddd;
      border: 4px ridge gray;
      padding: 8px;
      box-sizing: border-box;
      font-family: monospace;
    }

    .year-range-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .year-range-menus {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .year-range select {
      width: 72px;
      font-family: monospace;
      font-size: 14px;
      background: white;
      border: 2px inset gray;
    }

    .reel-window {
      width: 180px;
      height: 220px;
      overflow: hidden;
      background: white;
      border: 6px ridge gray;
      position: relative;
      z-index: 5;
    }

    .reel-strip {
      position: absolute;
      width: 100%;
      top: 0;
      left: 0;
      will-change: transform;
      z-index: 1;
    }

    .item {
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-family: monospace;
      padding: 12px;
      box-sizing: border-box;
      text-align: center;
      white-space: normal;
      word-break: break-word;
      line-height: 1.2;
    }

    #year .item { background: #ffdddd; }
    #genre .item { background: #ddeeff; }
    #wild .item { background: #fff4aa; }
    #actor-one .item { background: #ddffdd; }
    #actor-two .item { background: #ffe1f3; }
    #open-wheel .item { background: #eeeeff; }

    .actor-window {
      width: 260px;
    }

    .actor-window .item {
      font-size: 17px;
    }

    .open-wheel-input {
      display: block;
      width: min(620px, 90vw);
      height: 170px;
      margin: 24px auto 0;
      padding: 12px;
      font-family: monospace;
      font-size: 16px;
      border: 6px ridge gray;
      box-sizing: border-box;
      resize: vertical;
      background: white;
    }

    .open-note {
      margin-top: 8px;
      font-family: monospace;
      font-size: 15px;
      background: yellow;
      display: inline-block;
      padding: 4px 10px;
      border: 3px solid black;
    }

    .open-wheel-stage {
      width: 620px;
      height: 330px;
      position: relative;
      overflow: visible;
      background: transparent;
      border: 0;
      box-sizing: border-box;
      perspective: 600px;
    }

    .open-machine {
      margin-top: 0;
      min-height: 350px;
    }

    .open-card {
      position: absolute;
      width: 280px;
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      box-sizing: border-box;
      background: #ff9f1c;
      border: 6px ridge gray;
      font-family: monospace;
      font-size: 18px;
      line-height: 1.15;
      text-align: center;
      word-break: break-word;
      box-shadow: 7px 7px 0 black;
      overflow: hidden;
      contain: paint;
      backface-visibility: hidden;
      transform-origin: center center;
      will-change: left, top, transform, opacity;
    }

    .open-card-text {
      width: 100%;
      max-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      pointer-events: none;
      transform: translateZ(0);
    }

    .open-wheel-stage.finished .open-card.top,
    .open-wheel-stage.finished .open-card.bottom {
      display: none;
    }

    .open-wheel-stage.finished .open-card.middle {
      display: flex;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(0deg) scale(1.08);
      background: #ff9f1c;
      border-color: black;
    }

    .open-card.winner-pop {
      animation: winnerPop 0.3s ease-out forwards;
    }

    .open-card.toss-left {
      animation: tossLeft 0.28s cubic-bezier(.7, -.35, 1, .65) forwards;
    }

    .open-card.toss-right {
      animation: tossRight 0.28s cubic-bezier(.7, -.35, 1, .65) forwards;
    }

    .owen-cameo {
      position: absolute;
      right: 18px;
      top: 104px;
      width: 235px;
      pointer-events: none;
      opacity: 1;
      z-index: 70;
      filter: drop-shadow(6px 6px 0 black);
    }

    .owen-cameo.active {
      animation: owenWheelson 3.8s ease-in-out forwards;
    }

    .owen-speech {
      position: absolute;
      right: 120px;
      top: 42px;
      max-width: 210px;
      background: white;
      border: 4px solid black;
      border-radius: 22px;
      padding: 12px 14px;
      font-family: "Comic Sans MS", Arial, sans-serif;
      font-size: 18px;
      line-height: 1.1;
      z-index: 71;
      box-shadow: 5px 5px 0 black;
    }

    .owen-speech::after {
      content: "";
      position: absolute;
      right: 12px;
      bottom: -17px;
      width: 28px;
      height: 20px;
      background: white;
      border-right: 4px solid black;
      border-bottom: 4px solid black;
      transform: rotate(34deg);
    }

    .owen-speech.hidden {
      display: none;
    }

    @keyframes winnerPop {
      0% {
        transform: translate(-50%, -50%) rotate(0deg) scale(0.98);
      }
      55% {
        transform: translate(-50%, -50%) rotate(-5deg) scale(1.24);
      }
      100% {
        transform: translate(-50%, -50%) rotate(0deg) scale(1.08);
      }
    }

    @keyframes tossLeft {
      to {
        opacity: 0;
        translate: -720px -270px;
        rotate: -80deg;
        scale: 0.42;
      }
    }

    @keyframes tossRight {
      to {
        opacity: 0;
        translate: 720px -270px;
        rotate: 80deg;
        scale: 0.42;
      }
    }

    @keyframes owenWheelson {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
      14% {
        transform: translate(-10px, -12px) rotate(-10deg) scale(1.08);
      }
      28% {
        transform: translate(12px, 8px) rotate(9deg) scale(0.98);
      }
      44% {
        transform: translate(-16px, 4px) rotate(-12deg) scale(1.16);
      }
      62% {
        transform: translate(10px, -10px) rotate(10deg) scale(1.34);
      }
      80% {
        transform: translate(-8px, 8px) rotate(-7deg) scale(1.12);
      }
      100% {
        opacity: 1;
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
    }

    button {
      margin-top: 30px;
      padding: 14px 40px;
      font-size: 22px;
      background: #c0c0c0;
      border: 4px outset white;
      cursor: pointer;
    }

    button:active {
      border: 4px inset white;
    }

    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-size: 20px;
      background: white;
      z-index: 2;
      white-space: pre;
    }

    #year-placeholder { background: #ffdddd; }
    #genre-placeholder { background: #ddeeff; }
    #wild-placeholder { background: #fff4aa; }

    #cameo-back-layer,
    #cameo-front-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    #cameo-back-layer {
      z-index: 4;
    }

    #cameo-front-layer {
      z-index: 50;
    }

    #mole-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 60;
    }

    .cameo {
      position: fixed;
      max-width: 390px;
      max-height: 310px;
      object-fit: contain;
      pointer-events: none;
      filter: drop-shadow(6px 8px 2px rgba(0, 0, 0, 0.45));
    }

    .drive-cameo {
      left: -430px;
      bottom: 8vh;
      width: 400px;
      z-index: 20;
      animation: driveAcross 2.65s linear forwards;
    }

    .delorean-cameo {
      z-index: 20;
    }

    .fly-cameo {
      left: -430px;
      top: 18vh;
      width: 390px;
      animation: flyAcross 2.45s ease-in-out forwards;
    }

    .tie-cameo {
      left: -360px;
      bottom: -210px;
      width: 380px;
      z-index: 20;
      animation: tieFlyAway 2.8s ease-out forwards;
    }

    .peek-window {
      position: fixed;
      height: 260px;
      overflow: hidden;
      pointer-events: none;
      z-index: 4;
    }

    .peek-cameo {
      position: absolute;
      bottom: -260px;
      width: 240px;
      max-width: none;
      max-height: none;
      opacity: 0;
      transform: translateY(40px) scale(0.85);
      transform-origin: bottom center;
      animation: peekOut 2.65s ease-in-out forwards;
      z-index: 4;
    }

    .jason-cameo {
      width: 360px;
      clip-path: inset(0 0 18% 0);
      animation-name: jasonPeekOut;
    }

    .kermit-cameo {
      animation-name: kermitPeekOut;
    }

    .mole-window {
      position: fixed;
      width: 175px;
      height: 175px;
      overflow: hidden;
      pointer-events: none;
      z-index: 6;
    }

    .mole-face {
      position: absolute;
      left: 15px;
      top: 15px;
      width: 140px;
      border-radius: 50%;
      clip-path: circle(47% at 50% 50%);
    }

    .mole-left .mole-face {
      animation: faceMoleLeft 0.95s ease-in-out forwards;
    }

    .mole-right .mole-face {
      animation: faceMoleRight 0.95s ease-in-out forwards;
    }

    .mole-bottom .mole-face {
      animation: faceMoleBottom 0.95s ease-in-out forwards;
    }

    @keyframes driveAcross {
      0% { transform: translateX(0) rotate(-2deg); }
      50% { transform: translateX(calc(50vw + 215px)) rotate(1deg); }
      100% { transform: translateX(calc(100vw + 860px)) rotate(-1deg); }
    }

    @keyframes flyAcross {
      0% { transform: translateX(0) translateY(20px) rotate(-7deg); }
      45% { transform: translateX(calc(50vw + 215px)) translateY(-26px) rotate(4deg); }
      100% { transform: translateX(calc(100vw + 860px)) translateY(10px) rotate(9deg); }
    }

    @keyframes tieFlyAway {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1.2) rotate(-14deg);
      }
      80% {
        opacity: 1;
      }
      100% {
        opacity: 1;
        transform: translate(calc(100vw + 420px), calc(-100vh - 220px)) scale(0.08) rotate(24deg);
      }
    }

    @keyframes peekOut {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(0.85);
      }
      1% {
        opacity: 1;
        transform: translateY(40px) scale(0.85);
      }
      18%, 76% {
        opacity: 1;
        transform: translateY(-120px) scale(1);
      }
      92% {
        opacity: 1;
        transform: translateY(40px) scale(0.85);
      }
      100% {
        opacity: 0;
        transform: translateY(40px) scale(0.85);
      }
    }

    @keyframes jasonPeekOut {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(0.85);
      }
      1% {
        opacity: 1;
        transform: translateY(40px) scale(0.85);
      }
      18%, 76% {
        opacity: 1;
        transform: translateY(-170px) scale(1);
      }
      92% {
        opacity: 1;
        transform: translateY(40px) scale(0.85);
      }
      100% {
        opacity: 0;
        transform: translateY(40px) scale(0.85);
      }
    }

    @keyframes kermitPeekOut {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(0.85);
      }
      1% {
        opacity: 1;
        transform: translateY(40px) scale(0.85);
      }
      18%, 76% {
        opacity: 1;
        transform: translateY(-220px) scale(1);
      }
      92% {
        opacity: 1;
        transform: translateY(40px) scale(0.85);
      }
      100% {
        opacity: 0;
        transform: translateY(40px) scale(0.85);
      }
    }

    @keyframes faceMoleLeft {
      0% {
        transform: translateX(175px) rotate(-90deg) scale(0.85);
      }
      18%, 78% {
        transform: translateX(58px) rotate(-90deg) scale(1);
      }
      100% {
        transform: translateX(175px) rotate(-90deg) scale(0.85);
      }
    }

    @keyframes faceMoleRight {
      0% {
        transform: translateX(-175px) rotate(90deg) scale(0.85);
      }
      18%, 78% {
        transform: translateX(-58px) rotate(90deg) scale(1);
      }
      100% {
        transform: translateX(-175px) rotate(90deg) scale(0.85);
      }
    }

    @keyframes faceMoleBottom {
      0% {
        transform: translateY(-175px) rotate(180deg) scale(0.85);
      }
      18%, 78% {
        transform: translateY(-58px) rotate(180deg) scale(1);
      }
      100% {
        transform: translateY(-175px) rotate(180deg) scale(0.85);
      }
    }
  </style>
</head>

<body>

<div class="tabs">
  <button class="tab-button active" id="movie-tab" onclick="showGame('movie')">Movie Slot</button>
  <button class="tab-button" id="six-tab" onclick="showGame('six')">Six Degrees</button>
  <button class="tab-button" id="open-tab" onclick="showGame('open')">Open Wheelson</button>
</div>

<section class="game-panel active" id="movie-game">

<h1>🎬 JOEL'S MOVIE SLOT MACHINE 🎰</h1>

<img src="face.png" id="face">

<div id="cameo-back-layer"></div>
<div id="cameo-front-layer"></div>

<div class="machine">

  <div class="column" id="year-column">
    <div class="label">YEAR</div>
    <div class="reel-window">
      <div class="placeholder" id="year-placeholder">━━━►━━━►━━━</div>
      <div class="reel-strip" id="year"></div>
    </div>
    <div class="year-range">
      <div class="year-range-title">Year Range</div>
      <div class="year-range-menus">
        <select id="year-start" aria-label="Start year"></select>
        <select id="year-end" aria-label="End year"></select>
      </div>
    </div>
  </div>

  <div class="column">
    <div class="label">GENRE</div>
    <div class="reel-window">
      <div class="placeholder" id="genre-placeholder">▭▭▭▭▭</div>
      <div class="reel-strip" id="genre"></div>
    </div>
  </div>

  <div class="column" id="wild-column">
    <div class="label">WILDCARD</div>
    <div class="reel-window">
      <div class="placeholder" id="wild-placeholder">━━✕━━✕━━</div>
      <div class="reel-strip" id="wild"></div>
    </div>
  </div>

</div>

<button onclick="spin()">SPIN</button>

</section>

<section class="game-panel" id="six-game">

<h1>Joel's Six Degrees Wheel</h1>

<div id="mole-layer"></div>

<div class="machine">

  <div class="column" id="actor-one-column">
    <div class="label">ACTOR 1</div>
    <div class="reel-window actor-window">
      <div class="placeholder" id="actor-one-placeholder">?????</div>
      <div class="reel-strip" id="actor-one"></div>
    </div>
  </div>

  <div class="column" id="actor-two-column">
    <div class="label">ACTOR 2</div>
    <div class="reel-window actor-window">
      <div class="placeholder" id="actor-two-placeholder">?????</div>
      <div class="reel-strip" id="actor-two"></div>
    </div>
  </div>

</div>

<button onclick="spinActors()">SPIN</button>

</section>

<section class="game-panel" id="open-game">

<h1>Open Wheelson</h1>

<div class="open-layout">

  <img src="owenwilson.png" id="owen-wilson-cameo" class="owen-cameo" alt="">
  <div class="owen-speech" id="owen-speech">Hi I'm Open Wheelson.</div>

  <div class="machine open-machine">

    <div class="column">
      <div class="open-wheel-stage finished" id="open-wheel-stage">
        <div class="open-card top" id="open-card-top"><span class="open-card-text">Pizza</span></div>
        <div class="open-card middle" id="open-card-middle"><span class="open-card-text">Tacos</span></div>
        <div class="open-card bottom" id="open-card-bottom"><span class="open-card-text">Sushi</span></div>
      </div>
    </div>

  </div>

</div>

<textarea class="open-wheel-input" id="open-wheel-input" spellcheck="false">Pizza
Tacos
Sushi
Burgers
Nachos
Owen Wilson</textarea>
<div class="open-note">Put one option per line</div>

<br>
<button onclick="spinOpenWheel()">SPIN</button>

</section>

function random(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function shuffled(arr) {
  const copy = arr.slice();
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const temp = copy[i];
    copy[i] = copy[j];
    copy[j] = temp;
  }
  return copy;
}

function makeYearList(start, end) {
  const list = [];
  for (let i = start; i <= end; i++) list.push(i.toString());
  return list;
}

function fillYearMenu(select, defaultYear) {
  for (let i = MIN_YEAR; i <= MAX_YEAR; i++) {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = i;
    if (i === defaultYear) option.selected = true;
    select.appendChild(option);
  }
}

function buildReel(el, data) {
  el.innerHTML = "";
  const loop = data.concat(data).concat(data);

  loop.forEach(text => {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = text;
    el.appendChild(div);
  });
}

function positionOpenCard(card, angle, isFinal = false, trackScale = 1) {
  if (isFinal) {
    card.style.left = "50%";
    card.style.top = "50%";
    card.style.opacity = "1";
    card.style.zIndex = "2";
    card.style.transform = "translate(-50%, -50%) rotate(0deg) scale(1.08)";
    return;
  }

  const centerX = 310;
  const centerY = 165;
  const radiusX = 190;
  const radiusY = 82;
  const x = centerX + Math.cos(angle) * radiusX * trackScale;
  const y = centerY + Math.sin(angle) * radiusY * trackScale;
  const frontness = (Math.cos(angle) + 1) / 2;
  const scale = 0.82 + frontness * 0.26 * trackScale;
  const tilt = Math.sin(angle) * 7 * trackScale;

  card.style.display = "flex";
  card.style.left = `${x}px`;
  card.style.top = `${y}px`;
  card.style.opacity = `${0.55 + frontness * 0.45}`;
  card.style.zIndex = `${Math.round(frontness * 10) + 1}`;
  card.style.transform = `translate(-50%, -50%) rotate(${tilt}deg) scale(${scale})`;
}

function snap(el, target) {
  el.style.transform = `translateY(${-target * ITEM_HEIGHT}px)`;
}

function clearCameo() {
  clearTimeout(cameoTimer);
  cameoBackLayer.innerHTML = "";
  cameoFrontLayer.innerHTML = "";
}

function tryPlayRandomCameo(choices) {
  if (choices.length === 0) {
    cameoBag = [];
    return;
  }

  const availableChoices = choices.slice();
  const cameo = availableChoices.shift();
  cameoBag = availableChoices.slice();
  const img = document.createElement("img");

  img.src = cameo.file;
  img.alt = "";
  img.className = "cameo";

  img.addEventListener("load", () => {
    playCameoImage(img, cameo);
  }, { once: true });

  img.addEventListener("error", () => {
    tryPlayRandomCameo(availableChoices);
  }, { once: true });
}

function playCameoImage(img, cameo) {
  clearCameo();

  if (cameo.type === "drive") {
    img.classList.add("drive-cameo");
  }

  if (cameo.file === "delorean.png") {
    img.classList.add("delorean-cameo");
  }

  if (cameo.type === "fly") {
    img.classList.add("fly-cameo");
  }

  if (cameo.type === "tie") {
    img.classList.add("tie-cameo");
  }

  if (cameo.type === "peek") {
    const hidingSpots = [
      document.querySelector("#year-column .reel-window"),
      document.querySelector("#wild-column .reel-window")
    ];
    const hidingSpot = (cameo.file === "jason.png"
      ? document.querySelector("#wild-column .reel-window")
      : random(hidingSpots)
    ).getBoundingClientRect();
    const peekWindow = document.createElement("div");
    const windowWidth = cameo.file === "jason.png" ? 430 : 230;

    img.classList.add("peek-cameo");
    if (cameo.file === "jason.png") {
      img.classList.add("jason-cameo");
    }
    if (cameo.file === "kermit.png") {
      img.classList.add("kermit-cameo");
    }
    const peekWidth = cameo.file === "jason.png" ? 360 : 240;
    peekWindow.className = "peek-window";
    peekWindow.style.width = `${windowWidth}px`;
    peekWindow.style.left = `${hidingSpot.left + hidingSpot.width / 2 - windowWidth / 2}px`;
    peekWindow.style.top = `${hidingSpot.top - 260}px`;
    img.style.left = `${windowWidth / 2 - peekWidth / 2}px`;
    peekWindow.appendChild(img);
  }

  if (cameo.type === "peek") {
    cameoBackLayer.appendChild(img.parentElement);
  } else {
    cameoFrontLayer.appendChild(img);
  }

  img.addEventListener("animationend", clearCameo, { once: true });
}

function playSpinCameo() {
  clearCameo();
  cameoTimer = setTimeout(() => {
    if (cameoBag.length === 0) {
      cameoBag = shuffled(cameos);
    }
    tryPlayRandomCameo(cameoBag);
  }, 250);
}

let placeholdersHidden = false;

function clearMoles() {
  moleTimers.forEach(timer => clearTimeout(timer));

}

function popFaceMole(boxEl, side) {
  const box = boxEl.getBoundingClientRect();
  const moleWindow = document.createElement("div");
  const moleFace = document.createElement("img");

  moleWindow.className = `mole-window mole-${side}`;

  if (side === "left") {
    moleWindow.style.left = `${box.left - 175}px`;
    moleWindow.style.top = `${box.top + box.height / 2 - 87.5}px`;
  }

  if (side === "right") {
    moleWindow.style.left = `${box.right}px`;
    moleWindow.style.top = `${box.top + box.height / 2 - 87.5}px`;
  }

  if (side === "bottom") {
    moleWindow.style.left = `${box.left + box.width / 2 - 87.5}px`;
    moleWindow.style.top = `${box.bottom}px`;
  }

  moleFace.className = "mole-face";
  moleFace.src = "face.png";
  moleFace.alt = "";

  moleWindow.appendChild(moleFace);
  moleLayer.appendChild(moleWindow);
  moleFace.addEventListener("animationend", () => {
    moleWindow.remove();
  }, { once: true });
}

function spinActors() {
  if (isActorSpinning) return;
  isActorSpinning = true;
  clearMoles();

  if (!actorPlaceholdersHidden) {
    document.querySelectorAll("#six-game .placeholder").forEach(p => {
      p.style.display = "none";
    });
    actorPlaceholdersHidden = true;
  }

  const actorBoxes = [
    document.querySelector("#actor-one-column .reel-window"),
    document.querySelector("#actor-two-column .reel-window")
  ];
  const firstBoxIndex = Math.floor(Math.random() * actorBoxes.length);
  const boxOrder = [
    actorBoxes[firstBoxIndex],
    actorBoxes[1 - firstBoxIndex],
    actorBoxes[firstBoxIndex]
  ];
  const sideOrder = shuffled(["left", "right", "bottom"]);

  moleTimers = [500, 1650, 2800].map((delay, index) => {
    return setTimeout(() => popFaceMole(boxOrder[index], sideOrder[index]), delay);
  });

  const startTime = performance.now();
  const reels = [
    { el: actorOneEl, list: actorListOne, duration: 4100 },
    { el: actorTwoEl, list: actorListTwo, duration: 4700 }
  ].map(r => ({
    el: r.el,
    target: r.list.length * 2 + Math.floor(Math.random() * r.list.length),
    duration: r.duration,
    done: false
  }));

  function ease(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function animate() {
    const now = performance.now();
    let allDone = true;

    reels.forEach(r => {
      if (r.done) return;

      const t = Math.min((now - startTime) / r.duration, 1);
      const e = ease(t);
      const pos = e * (r.target * ITEM_HEIGHT);

      r.el.style.transform = `translateY(${-pos}px)`;

      if (t >= 1) {
        r.done = true;
        snap(r.el, r.target);
      } else {
        allDone = false;
      }
    });

    if (!allDone) {
      requestAnimationFrame(animate);
    } else {
      reels.forEach(r => snap(r.el, r.target));
      isActorSpinning = false;
    }
  }

  requestAnimationFrame(animate);
}

function spinOpenWheel() {
  if (isOpenSpinning) return;

  const items = getOpenWheelItems();
  if (items.length === 0) {
    alert("Add at least one thing to spin.");
    return;
  }

  isOpenSpinning = true;
  openWheelStageEl.classList.remove("finished");
  owenSpeechEl.classList.add("hidden");
  owenWilsonCameoEl.classList.remove("active");
  void owenWilsonCameoEl.offsetWidth;
  owenWilsonCameoEl.classList.add("active");
  [openCardTopEl, openCardMiddleEl, openCardBottomEl].forEach(card => {
    card.classList.remove("winner-pop", "toss-left", "toss-right");
    card.style.display = "flex";
  });

  const startTime = performance.now();
  const finalIndex = Math.floor(Math.random() * items.length);
  const duration = 3800;
  const cards = [openCardTopEl, openCardMiddleEl, openCardBottomEl];
  const fullTurns = 10;
  let lastBaseIndex = null;
  let tossStarted = false;

  function ease(t) {
    return 1 - Math.pow(1 - t, 2.6);
  }

  function animate() {
    const now = performance.now();
    const t = Math.min((now - startTime) / duration, 1);
    const spinAmount = fullTurns * Math.PI * 2 * ease(t);
    const baseIndex = Math.floor(spinAmount / (Math.PI / 1.15));
    const finishT = Math.max(0, (t - 0.82) / 0.18);
    const trackScale = 1 - finishT;

    if (finishT === 0 && baseIndex !== lastBaseIndex) {
      lastBaseIndex = baseIndex;
      cards.forEach((card, index) => {
        const optionIndex = (baseIndex + index * 2) % items.length;
        card.dataset.optionIndex = optionIndex;
        setOpenCardText(card, items[optionIndex]);
        setOpenCardColor(card, optionIndex);
      });
    }

    if (!tossStarted && finishT > 0.45) {
      tossStarted = true;
      openCardTopEl.classList.add("toss-left");
      openCardBottomEl.classList.add("toss-right");
    }

    cards.forEach((card, index) => {
      const angle = spinAmount + (index - 1) * ((Math.PI * 2) / 3);
      if (tossStarted && index !== 1) return;

      if (finishT > 0 && index === 1) {
        card.dataset.optionIndex = finalIndex;
        setOpenCardText(card, items[finalIndex]);
        setOpenCardColor(card, finalIndex);
      }
      positionOpenCard(card, angle, false, index === 1 ? trackScale : 1);
      if (finishT > 0 && index !== 1) {
        card.style.opacity = "1";
      }
    });

    openWheelStageEl.style.transform = `rotate(${Math.sin(spinAmount) * 1.5 * trackScale}deg)`;

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      openWheelStageEl.style.transform = "";
      setTimeout(() => {
        setOpenWheelResult(items[finalIndex], finalIndex, true);
        isOpenSpinning = false;
      }, 60);
    }
  }

  requestAnimationFrame(animate);
}

  isSpinning = true;

  updateYearsFromMenus();
  playSpinCameo();

  if (!placeholdersHidden) {

  }

  const face = document.getElementById("face");

  const startTime = performance.now();

  const reels = [
    { el: yearEl, list: years, duration: 2600 },

    { el: wildEl, list: wildcards, duration: 3700 }
  ].map(r => ({
    el: r.el,
    target: r.list.length * 2 + Math.floor(Math.random() * r.list.length),
    duration: r.duration,
    done: false
  }));

  function ease(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function animate() {
    const now = performance.now();
    let allDone = true;

    reels.forEach(r => {
      if (r.done) return;

      const t = Math.min((now - startTime) / r.duration, 1);
      const e = ease(t);
      const pos = e * (r.target * ITEM_HEIGHT);

      r.el.style.transform = `translateY(${-pos}px)`;

      if (t >= 1) {
        r.done = true;
        snap(r.el, r.target);
      } else {
        allDone = false;
      }
    });

    if (!allDone) {
      requestAnimationFrame(animate);
    } else {
      reels.forEach(r => snap(r.el, r.target));
      face.classList.remove("spinning");
      isSpinning = false;
    }
  }

  requestAnimationFrame(animate);
}

</script>
