<!DOCTYPE html>
<html>
<head>
  <title>Joel's Movie Slot Machine</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Comic Sans MS", Arial, sans-serif;
      text-align: center;
      background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00);
      overflow: hidden;
      position: relative;
    }

    h1 {
      font-size: 58px;
      margin-top: 20px;
      color: blue;
      text-shadow: 2px 2px white, 4px 4px black;
      transform: rotate(-2deg);
      position: relative;
      z-index: 2;
    }

    #face-container {
      margin-top: 10px;
      display: inline-block;
      position: relative;
      z-index: 2;
    }

    #face {
      width: 140px;
      border: 5px outset gold;
      box-shadow: 0 0 0 3px black;
    }

    .spinning {
      animation: spinny 0.8s linear infinite;
    }

    @keyframes spinny {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .machine {
      display: flex;
      justify-content: center;
      margin-top: 40px;
      gap: 10px;
      position: relative;
      z-index: 2;
    }

    .column {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .label {
      font-size: 22px;
      background: yellow;
      border: 3px solid black;
      padding: 4px 10px;
      margin-bottom: 6px;
      transform: rotate(-2deg);
    }

    .reel {
      width: 180px;
      height: 220px;
      background: #ffffff;
      border: 6px ridge gray;
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: inset 3px 3px 0 #ccc, inset -3px -3px 0 #999;
    }

    #year { background: #ffdddd; }
    #genre { background: #ddeeff; }
    #wild { background: #fff4aa; }

    button {
      margin-top: 30px;
      padding: 14px 40px;
      font-size: 22px;
      background: #c0c0c0;
      border: 4px outset white;
      cursor: pointer;
      position: relative;
      z-index: 2;
    }

    button:active {
      border: 4px inset white;
    }

    /* 🎆 EMOJI FIREWORK LAYER */
    #fireworksLayer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      font-size: 40px;
    }

    .boom {
      position: absolute;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.3s ease-out;
      white-space: nowrap;
    }

    .boom.show {
      opacity: 1;
      transform: scale(1);
    }
  </style>
</head>

<body>

<div id="fireworksLayer"></div>

<h1>🎬 JOEL'S MOVIE SLOT MACHINE 🎰</h1>

<div id="face-container">
  <img src="face.png" id="face">
</div>

<div class="machine">

  <div class="column">
    <div class="label">YEAR</div>
    <div class="reel" id="year">---</div>
  </div>

  <div class="column">
    <div class="label">GENRE</div>
    <div class="reel" id="genre">---</div>
  </div>

  <div class="column">
    <div class="label">WILDCARD</div>
    <div class="reel" id="wild">---</div>
  </div>

</div>

<button onclick="spin()">SPIN!!!</button>

<script>
  const years = [];
  for (let i = 1960; i <= 2026; i++) years.push(i.toString());

  const genres = [
    "Comedy","Horror","Drama","Action","Mystery",
    "Romance","Sci-Fi","Crime"
  ];

  const wildcards = [
    "I’ve never seen",
    "Starring a “Cancelled” Actor",
    "I’ve seen in a theatre.",
    "Directed by someone I’ve never heard of",
    "Made by a non-American",
    "Based on a book",
    "Sequel",
    "Has been remade or is a remake",
    "Starring an actor known better for a TV show",
    "Starring an Oscar winner",
    "Directorial Debut",
    "On Netflix",
    "On Prime",
    "On Tubi",
    "nobody I know on letteboxd has watched it"
  ];

  function random(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function spawnEmojiFireworks() {
    const layer = document.getElementById("fireworksLayer");
    layer.innerHTML = "";

    const emojis = ["🎆", "🎇", "✨", "🎉", "🔥"];

    for (let i = 0; i < 25; i++) {
      const el = document.createElement("div");

      el.className = "boom";
      el.textContent = random(emojis);

      el.style.left = Math.random() * window.innerWidth + "px";
      el.style.top = Math.random() * window.innerHeight + "px";

      el.style.fontSize = (20 + Math.random() * 50) + "px";

      layer.appendChild(el);

      setTimeout(() => el.classList.add("show"), i * 30);

      setTimeout(() => {
        el.classList.remove("show");
        setTimeout(() => el.remove(), 300);
      }, 1200);
    }
  }

  function spin() {
    const year = document.getElementById("year");
    const genre = document.getElementById("genre");
    const wild = document.getElementById("wild");
    const face = document.getElementById("face");

    face.classList.add("spinning");

    let ticks = 25;

    const interval = setInterval(() => {
      year.textContent = random(years);
      genre.textContent = random(genres);
      wild.textContent = random(wildcards);

      ticks--;

      if (ticks <= 0) {
        clearInterval(interval);

        face.classList.remove("spinning");

        year.textContent = random(years);
        genre.textContent = random(genres);
        wild.textContent = random(wildcards);

        spawnEmojiFireworks();
      }
    }, 120);
  }
</script>

</body>
</html>
