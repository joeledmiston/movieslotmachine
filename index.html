<!DOCTYPE html>
<html>
<head>
  <title>Joel's Movie Slot Machine</title>
  <style>
    body {
      font-family: "Comic Sans MS", Arial, sans-serif;
      text-align: center;
      background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00);
      overflow: hidden;
    }
    h1 {
      font-size: 58px;
      margin-top: 20px;
      color: blue;
      text-shadow: 2px 2px white, 4px 4px black;
    }
    #face {
      width: 140px;
      border: 5px outset gold;
      box-shadow: 0 0 0 3px black;
    }
    .spinning {
      animation: spinny 0.8s linear infinite;
    }
    @keyframes spinny {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .machine {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      margin-top: 40px;
      gap: 10px;
    }
    .column {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    .label {
      font-size: 22px;
      background: yellow;
      border: 3px solid black;
      padding: 4px 10px;
    }
    .year-range {
      width: 180px;
      margin-top: 10px;
      background: #ffdddd;
      border: 4px ridge gray;
      padding: 8px;
      box-sizing: border-box;
      font-family: monospace;
    }
    .year-range-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .year-range-menus {
      display: flex;
      gap: 6px;
      justify-content: center;
    }
    .year-range select {
      width: 72px;
      font-family: monospace;
      font-size: 14px;
      background: white;
      border: 2px inset gray;
    }
    .reel-window {
      width: 180px;
      height: 220px;
      overflow: hidden;
      background: white;
      border: 6px ridge gray;
      position: relative;
      z-index: 5;
    }
